<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Catálogo | Vulcan Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">VULCAN<span>STORE</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><a href="login.html" id="nav-user">Login</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 style="margin-bottom:30px;">DROPS DISPONÍVEIS</h2>
        
        <div class="product-grid">
            <div class="product-card" onclick="setOrder('Camiseta Streetwear Oversized')">
                <div class="tag-promo">NEW DROP</div>
                <img src="https://picsum.photos/600/600?street">
                <div style="padding:15px;">
                    <h4>STREETWEAR OVERSIZED</h4>
                    <p style="color:var(--primary); font-weight:bold;">ORÇAR AGORA</p>
                </div>
            </div>

            <div class="product-card" onclick="setOrder('Camiseta de Time Tailandesa 1:1')">
                <div class="tag-promo">MAIS VENDIDO</div>
                <img src="https://picsum.photos/600/600?jersey">
                <div style="padding:15px;">
                    <h4>CAMISAS DE TIME 1:1</h4>
                    <p style="color:var(--primary); font-weight:bold;">ORÇAR AGORA</p>
                </div>
            </div>
        </div>

        <section id="order-form" style="display:none; background:#000; color:white; padding:40px; margin-top:50px; border-radius:4px;">
            <h3 id="prod-name" style="color:var(--primary); margin-bottom:20px;"></h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div>
                    <label>TAMANHO E VALOR</label>
                    <select id="size" style="width:100%; padding:12px; background:#222; color:white; border:none;">
                        <option value="P - R$ 129,90">P - R$ 129,90</option>
                        <option value="M - R$ 129,90">M - R$ 129,90</option>
                        <option value="G - R$ 139,90">G - R$ 139,90</option>
                        <option value="GG - R$ 149,90">GG - R$ 149,90</option>
                    </select>
                </div>
                <div>
                    <label>DÚVIDAS / OBSERVAÇÕES</label>
                    <input type="text" id="obs" placeholder="Ex: Cor preta, modelo oversized" style="width:100%; padding:12px; background:#222; color:white; border:none;">
                </div>
            </div>
            <button onclick="enviarZap()" style="width:100%; margin-top:20px; background:#25D366; color:white; padding:15px; border:none; font-weight:900; cursor:pointer;">FINALIZAR PEDIDO NO WHATSAPP</button>
        </section>

        <div style="margin-top:40px;">
            <h3>MEUS ÚLTIMOS ORÇAMENTOS</h3>
            <div id="hist-list"></div>
        </div>
    </div>

    <script>
        let currentItem = "";
        const user = JSON.parse(localStorage.getItem('vulcan_user'));

        function setOrder(name) {
            currentItem = name;
            document.getElementById('prod-name').innerText = `🛒 SELECIONADO: ${name.toUpperCase()}`;
            document.getElementById('order-form').style.display = "block";
            document.getElementById('order-form').scrollIntoView({behavior:'smooth'});
        }

        function enviarZap() {
            if(!user) { alert("Acesse sua conta primeiro!"); window.location.href="login.html"; return; }
            const size = document.getElementById('size').value;
            const obs = document.getElementById('obs').value;
            
            // Correção automática de nome
            const nomeCli = user.nome.toLowerCase().replace(/(^\w{1})|(\s+\w{1})/g, l => l.toUpperCase());

            const msg = `🔥 *PEDIDO VULCAN STORE*\n\n` +
                        `👤 *CLIENTE:* ${nomeCli}\n` +
                        `👕 *PRODUTO:* ${currentItem}\n` +
                        `📏 *TAMANHO:* ${size}\n` +
                        `📝 *OBS:* ${obs || 'Nenhuma'}\n\n` +
                        `💳 Aceitamos Cartão e Pix\n` +
                        `🚚 Envio para todo o Brasil`;

            window.open(`https://api.whatsapp.com/send?phone=5535991500447&text=${encodeURIComponent(msg)}`);
            
            let h = JSON.parse(localStorage.getItem('vulcan_hist')) || [];
            h.unshift({data: new Date().toLocaleDateString(), item: currentItem});
            localStorage.setItem('vulcan_hist', JSON.stringify(h));
            renderHistory();
        }

        function renderHistory() {
            const list = JSON.parse(localStorage.getItem('vulcan_hist')) || [];
            document.getElementById('hist-list').innerHTML = list.map(p => `<div style="background:#f4f4f4; padding:10px; margin-top:5px; border-left:3px solid var(--primary)">${p.data} - ${p.item}</div>`).join('');
        }
        renderHistory();
    </script>
</body>
</html>
