<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Produtos | Artesanato Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cat-menu { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; overflow-x: auto; }
        .cat-btn { border: 1px solid var(--primary); background: transparent; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--primary); color: white; }
        .history-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--gold); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">ART PRO</div>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="produtos.html">PRODUTOS</a></li>
            <li><a href="sobre.html">SOBRE</a></li>
            <li><a href="login.html" class="login-btn" id="nav-user">👤 LOGIN</a></li>
        </ul>
    </nav>

    <section class="container">
        <h2>Catálogo de Criações</h2>
        
        <div class="cat-menu">
            <button class="cat-btn active" onclick="loadCat('Kits Maternidade', this)">Kits Maternidade</button>
            <button class="cat-btn" onclick="loadCat('Bordados', this)">Bordados</button>
            <button class="cat-btn" onclick="loadCat('Presentes', this)">Presentes</button>
            <button class="cat-btn" onclick="loadCat('Crochê', this)">Crochê</button>
            <button class="cat-btn" onclick="loadCat('Decoração', this)">Decoração</button>
        </div>

        <div class="photo-grid" id="gallery"></div>

        <div style="background: white; padding: 40px; border-radius: 20px; margin-top: 50px;">
            <h3>Solicitar Orçamento Detalhado</h3>
            <p>Descreva cores, nomes e tamanhos desejados.</p>
            <textarea id="descricao" rows="5" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd;" placeholder="Ex: Kit Maternidade Azul Marinho, 3 peças, nome 'Gabriel'..." required></textarea>
            <button class="btn-main" style="margin-top:20px; background:#27ae60" onclick="enviarPedido()">ENVIAR PARA WHATSAPP</button>
        </div>

        <div style="margin-top: 50px;">
            <h3>Meu Histórico</h3>
            <div id="historico"></div>
        </div>
    </section>

    <script>
        const zap = "5535991554774";
        const gallery = document.getElementById('gallery');
        const user = JSON.parse(localStorage.getItem('artesao_user'));

        if(user) document.getElementById('nav-user').innerText = `Olá, ${user.nome.split(' ')[0]}`;

        function loadCat(nome, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            gallery.innerHTML = '';
            for(let i=1; i<=10; i++) {
                gallery.innerHTML += `<div class="photo-card"><img src="https://picsum.photos/400?random=${nome+i}"></div>`;
            }
        }

        function enviarPedido() {
            if(!user) { alert("Faça login para continuar!"); window.location.href='login.html'; return; }
            const desc = document.getElementById('descricao').value;
            if(!desc) { alert("Preencha a descrição!"); return; }

            const pedido = { data: new Date().toLocaleDateString('pt-BR'), texto: desc };
            let historico = JSON.parse(localStorage.getItem('pedidos')) || [];
            historico.unshift(pedido);
            localStorage.setItem('pedidos', JSON.stringify(historico));

            renderHistory();
            const msg = `Olá! Sou ${user.nome}.\nPedido: ${desc}`;
            window.open(`https://api.whatsapp.com/send?phone=${zap}&text=${encodeURIComponent(msg)}`);
        }

        function renderHistory() {
            const histDiv = document.getElementById('historico');
            let historico = JSON.parse(localStorage.getItem('pedidos')) || [];
            if(historico.length === 0) { histDiv.innerHTML = "<p>Nenhum pedido ainda.</p>"; return; }
            histDiv.innerHTML = historico.map(p => `<div class="history-card"><strong>${p.data}</strong><br>${p.texto}</div>`).join('');
        }

        // Início padrão
        loadCat('Kits Maternidade', document.querySelector('.cat-btn'));
        renderHistory();
    </script>
</body>
</html>
