<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Produtos | Vulcan Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">VULCAN<span>STORE</span></div>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="produtos.html">CATÁLOGO</a></li>
            <li><a href="sobre.html">A MARCA</a></li>
            <li><a href="login.html" id="nav-user">👤 ACESSO</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 style="text-align: left;">DROP ATUAL</h2>
        
        <div class="cat-filter" style="margin-bottom: 30px; display: flex; gap: 15px;">
            <button onclick="filtrar('Streetwear')" class="btn-vulcan">Streetwear</button>
            <button onclick="filtrar('Times')" class="btn-vulcan" style="background:#333">Camisolas Equipas</button>
            <button onclick="filtrar('Corta-Vento')" class="btn-vulcan" style="background:#333">Corta-Vento</button>
            <button onclick="filtrar('Acessórios')" class="btn-vulcan" style="background:#333">Acessórios</button>
            <button onclick="filtrar('Outlet')" class="btn-vulcan" style="background:#333">Outlet</button>
        </div>

        <div id="catalog" class="product-grid">
            </div>

        <section id="order-box" style="background: #000; color: white; padding: 50px; border-radius: 4px; margin-top: 50px;">
            <h3>SOLICITAR DROP PERSONALIZADO</h3>
            <p>Descreva o modelo, tamanho (P ao GG) e cor desejada.</p>
            <textarea id="pedido-desc" rows="4" style="width:100%; background:#222; border:1px solid #444; color:white; padding:15px;" placeholder="Ex: Camisola do Real Madrid 24/25, tamanho M, versão jogador..."></textarea>
            <button onclick="enviarPedidoVulcan()" class="btn-vulcan" style="margin-top:20px; width:100%;">ENVIAR PARA O WHATSAPP DA VULCAN</button>
        </section>

        <div id="history-section" style="margin-top: 40px;">
            <h3>MEU HISTÓRICO DE PEDIDOS</h3>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        const ZAP_VULCAN = "5535991554774";
        const user = JSON.parse(localStorage.getItem('artesao_user'));

        function capitalizarNome(nome) {
            return nome.toLowerCase().replace(/(^\w{1})|(\s+\w{1})/g, l => l.toUpperCase());
        }

        function enviarPedidoVulcan() {
            if(!user) { alert("Faz login para registar o teu pedido!"); window.location.href='login.html'; return; }
            
            const desc = document.getElementById('pedido-desc').value;
            const nomeFormatado = capitalizarNome(user.nome);

            const pedido = { data: new Date().toLocaleDateString('pt-PT'), info: desc };
            let lista = JSON.parse(localStorage.getItem('vulcan_pedidos')) || [];
            lista.unshift(pedido);
            localStorage.setItem('vulcan_pedidos', JSON.stringify(lista));

            const msg = `VULCAN STORE - NOVO PEDIDO\n\nCliente: ${nomeFormatado}\nPedido: ${desc}`;
            window.open(`https://api.whatsapp.com/send?phone=${ZAP_VULCAN}&text=${encodeURIComponent(msg)}`);
            renderHistory();
        }

        function renderHistory() {
            const div = document.getElementById('history-list');
            const lista = JSON.parse(localStorage.getItem('vulcan_pedidos')) || [];
            div.innerHTML = lista.map(p => `<div style="background:#f4f4f4; padding:15px; margin-bottom:10px; border-left:4px solid #FF4500"><strong>${p.data}</strong>: ${p.info}</div>`).join('');
        }

        // Função para simular o catálogo (Aqui você colocará os links das fotos do Drive)
        function filtrar(cat) {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';
            for(let i=1; i<=10; i++) {
                catalog.innerHTML += `
                    <div class="product-card">
                        <img class="product-img" src="https://picsum.photos/400/500?random=${cat+i}">
                        <div class="product-info">
                            <h4>${cat} Edition Vol.${i}</h4>
                            <p style="color:var(--primary); font-weight:bold;">Sob Consulta</p>
                        </div>
                    </div>
                `;
            }
        }
        filtrar('Streetwear');
        renderHistory();
    </script>
</body>
</html>
