<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Catálogo | Vulcan Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">VULCAN<span>STORE</span></div>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="produtos.html">PRODUTOS</a></li>
            <li><a href="sobre.html">A MARCA</a></li>
            <li><a href="login.html" class="login-btn" id="nav-user">👤 LOGIN</a></li>
        </ul>
    </nav>

    <section class="container">
        <h2>DROPS EXCLUSIVOS</h2>
        
        <div class="cat-menu">
            <button class="cat-btn active" onclick="loadCat('Streetwear', this)">Streetwear</button>
            <button class="cat-btn" onclick="loadCat('Camisetas de Time', this)">Camisetas de Time</button>
            <button class="cat-btn" onclick="loadCat('Corta-Vento', this)">Corta-Vento</button>
        </div>

        <div class="product-grid" id="gallery">
            </div>

        <div id="orcamento-flutuante" class="order-form-container">
            <h3>ORÇAMENTO AUTOMÁTICO</h3>
            <p id="label-produto">Selecione um produto acima...</p>
            
            <div class="sub-opcoes">
                <label>Tamanho e Valor:</label>
                <select id="tamanho-valor">
                    <option value="P - R$ 129,90">P - R$ 129,90</option>
                    <option value="M - R$ 129,90">M - R$ 129,90</option>
                    <option value="G - R$ 139,90">G - R$ 139,90</option>
                    <option value="GG - R$ 149,90">GG - R$ 149,90</option>
                </select>
            </div>

            <textarea id="detalhes" placeholder="Ex: Cor preta, modelo oversized... (Obrigatório)"></textarea>
            <button class="btn-main" style="background:#25D366" onclick="enviarPedido()">FINALIZAR NO WHATSAPP</button>
        </div>

        <div style="margin-top:50px;">
            <h3>MEU HISTÓRICO VULCAN</h3>
            <div id="historico"></div>
        </div>
    </section>

    <script>
        let produtoSelecionado = "";

        function loadCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            // Simulando fotos do catálogo
            for(let i=1; i<=6; i++) {
                let nomeProd = `${cat} Mod. ${i}`;
                gallery.innerHTML += `
                    <div class="product-card" onclick="selecionarParaOrcamento('${nomeProd}')">
                        <img src="https://picsum.photos/400/500?random=${nomeProd}" alt="${nomeProd}">
                        <div class="product-info">
                            <h4>${nomeProd}</h4>
                            <p>Clique para Orçar</p>
                        </div>
                    </div>
                `;
            }
        }

        function selecionarParaOrcamento(nome) {
            produtoSelecionado = nome;
            document.getElementById('label-produto').innerHTML = `🛒 Orçando: <strong>${nome}</strong>`;
            document.getElementById('orcamento-flutuante').scrollIntoView({behavior: 'smooth'});
        }

        function enviarPedido() {
            const user = JSON.parse(localStorage.getItem('vulcan_user'));
            if(!user) { alert("Acesse sua conta primeiro!"); window.location.href='login.html'; return; }
            if(!produtoSelecionado) { alert("Selecione um produto no catálogo primeiro!"); return; }
            
            const tamValor = document.getElementById('tamanho-valor').value;
            const detalhes = document.getElementById('detalhes').value;

            // Formatação do Nome
            const nomeFormatado = user.nome.toLowerCase().replace(/(^\w{1})|(\s+\w{1})/g, l => l.toUpperCase());

            const msg = `VULCAN STORE - NOVO PEDIDO\n\n` +
                        `Cliente: ${nomeFormatado}\n` +
                        `Produto: ${produtoSelecionado}\n` +
                        `Tamanho/Valor: ${tamValor}\n` +
                        `Obs: ${detalhes}\n\n` +
                        `🚚 Enviar para: Brasil (Consultar Frete)`;

            window.open(`https://api.whatsapp.com/send?phone=5535991554774&text=${encodeURIComponent(msg)}`);
            
            // Salvar no Histórico
            let hist = JSON.parse(localStorage.getItem('vulcan_pedidos')) || [];
            hist.unshift({data: new Date().toLocaleDateString(), texto: `${produtoSelecionado} (${tamValor})`});
            localStorage.setItem('vulcan_pedidos', JSON.stringify(hist));
            renderHistory();
        }

        function renderHistory() {
            const h = document.getElementById('historico');
            let hist = JSON.parse(localStorage.getItem('vulcan_pedidos')) || [];
            h.innerHTML = hist.map(p => `<div class="history-card"><strong>${p.data}</strong> - ${p.texto}</div>`).join('');
        }

        loadCat('Streetwear', document.querySelector('.cat-btn'));
        renderHistory();
    </script>
</body>
</html>
