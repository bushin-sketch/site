{% extends 'base.html' %}
{% block content %}
<div class="container" style="padding-top: 40px;">
    <h2 style="text-transform: uppercase; border-bottom: 5px solid black; padding-bottom: 10px;">Gestão de Inventário</h2>
    
    <div style="display: flex; gap: 10px; margin: 20px 0;">
        <a href="/admin" class="btn-auth" style="width: auto; padding: 10px 20px;">+ NOVO DROP</a>
        <a href="/admin/cupons" class="btn-clear" style="border: 4px solid black; padding: 10px 20px; display: inline-block;">CUPONS</a>
    </div>

    <table style="width: 100%; border-collapse: collapse; margin-top: 20px; border: 3px solid black;">
        <thead style="background: black; color: white; text-transform: uppercase; font-size: 0.8rem;">
            <tr>
                <th style="padding: 15px; text-align: left;">Produto</th>
                <th>Preço</th>
                <th>Estoque (P/M/G)</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for p in produtos %}
            <tr style="border-bottom: 2px solid black;">
                <td style="padding: 15px;"><strong>{{ p.name }}</strong></td>
                <td>R$ {{ "%.2f"|format(p.price) }}</td>
                <td style="text-align: center;">{{ p.stock_p }}/{{ p.stock_m }}/{{ p.stock_g }}</td>
                <td style="text-align: center;">
                    <a href="/admin/edit/{{ p.id }}" style="color: #ff5100; font-size: 0.7rem;">EDITAR</a> | 
                    <a href="/admin/delete/{{ p.id }}" style="color: #ff5100; font-size: 0.7rem;" onclick="return confirm('Excluir produto?')">EXCLUIR</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
