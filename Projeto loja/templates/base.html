<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulcan Store | Streetwear Industrial</title>
    <!-- Link para o seu CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- O Flask já começa a busca de dentro da pasta 'templates', então use apenas o caminho relativo a ela -->
    {% include 'partials/navbar.html' %} 

    <!-- Exibição de mensagens de alerta/sucesso (Flash) -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div style="background: var(--black); color: var(--white); text-align: center; padding: 10px; font-size: 0.8rem;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <main class="container">
        {% block content %}
        <!-- Conteúdo dinâmico entra aqui -->
        {% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>

</body>
</html>
