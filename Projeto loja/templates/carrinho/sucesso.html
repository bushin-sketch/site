{% extends 'base.html' %}
{% block content %}
<div class="auth-container" style="max-width: 700px; text-align: center; padding: 80px 20px;">
    <div style="font-size: 5rem; color: #00ff00; margin-bottom: 20px;">
        <i class="fa-solid fa-circle-check"></i>
    </div>
    <h1 style="font-size: 3rem; line-height: 1; margin-bottom: 20px;">ORDEM RECEBIDA COM SUCESSO.</h1>
    <p style="letter-spacing: 2px; margin-bottom: 40px; color: #666;">SEU DROP JÁ ESTÁ SENDO PREPARADO PARA O ENVIO.</p>
    
    <div style="border: 2px solid black; padding: 20px; display: inline-block;">
        <p style="font-weight: 900;">NÚMERO DO PEDIDO: #{{ range(1000, 9999)|random }}</p>
    </div>
    
    <br><br>
    <a href="/" class="btn-auth" style="display: inline-block; width: auto; padding: 20px 40px;">VOLTAR PARA A LOJA</a>
</div>
{% endblock %}
