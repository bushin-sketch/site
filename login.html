<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso Vulcan Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#000;">
    <div class="container" style="max-width:400px; margin-top:100px;">
        <div style="background:#fff; padding:40px; border-radius:4px; text-align:center;">
            <h2 style="margin-bottom:20px;">VULCAN<span>STORE</span></h2>
            <form id="loginF">
                <input type="text" id="name" placeholder="Nome Completo" required oninput="cap(this)" style="color:#000; background:#fff; border:1px solid #ddd; padding:12px; width:100%; margin-bottom:15px;">
                <input type="email" id="email" placeholder="Seu E-mail" required style="color:#000; background:#fff; border:1px solid #ddd; padding:12px; width:100%; margin-bottom:15px;">
                <button type="submit" style="width:100%; padding:15px; background:#000; color:#fff; border:none; font-weight:900; cursor:pointer;">ENTRAR NO DROP</button>
            </form>
        </div>
    </div>
    <script>
        function cap(i) {
            let p = i.value.split(' ');
            for (let x = 0; x < p.length; x++) { if (p[x].length > 0) p[x] = p[x].charAt(0).toUpperCase() + p[x].slice(1).toLowerCase(); }
            i.value = p.join(' ');
        }
        document.getElementById('loginF').onsubmit = (e) => {
            e.preventDefault();
            localStorage.setItem('vulcan_user', JSON.stringify({nome: document.getElementById('name').value, email: document.getElementById('email').value}));
            window.location.href = "produtos.html";
        }
    </script>
</body>
</html>
